    <!-- v2.0 badge -->
    <rect x="-25" y="60" width="50" height="20" rx="4" fill="#6d28d9" opacity="0.6"/>
    <text x="0" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="white" opacity="0.9">v2.0</text>
  </g>
  <text x="400" y="320" text-anchor="middle" font-family="monospace" font-size="24" fill="#6d28d9" opacity="0.8">Harness Native</text>
</svg>