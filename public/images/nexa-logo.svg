<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" /> <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" /> </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="400" height="400" fill="transparent"/>

  <g filter="url(#shadow)">
    <rect x="100" y="90" width="46" height="220" rx="12" fill="#94A3B8" />
    
    <rect x="254" y="90" width="46" height="220" rx="12" fill="#94A3B8" />
    
    <path d="M 146 130 C 220 130, 180 270, 254 270" 
          fill="transparent" 
          stroke="url(#neuralGrad)" 
          stroke-width="46" 
          stroke-linecap="round" />
